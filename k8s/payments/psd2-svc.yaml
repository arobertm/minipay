---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: psd2-svc
  namespace: minipay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: psd2-svc
  template:
    metadata:
      labels:
        app: psd2-svc
    spec:
      containers:
        - name: psd2-svc
          image: ghcr.io/arobertm/minipay/psd2-svc:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8095
          env:
            - name: SERVER_PORT
              value: "8095"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8095
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8095
            initialDelaySeconds: 40
            periodSeconds: 15
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 200m

---
apiVersion: v1
kind: Service
metadata:
  name: psd2-svc
  namespace: minipay
spec:
  selector:
    app: psd2-svc
  ports:
    - port: 8095
      targetPort: 8095
