server:
  port: ${SERVER_PORT:8091}

spring:
  application:
    name: audit-svc

  threads:
    virtual:
      enabled: true

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/minipay_audit}
    username: ${SPRING_DATASOURCE_USERNAME:minipay}
    password: ${SPRING_DATASOURCE_PASSWORD:minipay_secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    "[ro.minipay.audit]": DEBUG
