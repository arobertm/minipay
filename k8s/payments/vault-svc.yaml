---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault-svc
  namespace: minipay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault-svc
  template:
    metadata:
      labels:
        app: vault-svc
    spec:
      containers:
        - name: vault-svc
          image: ghcr.io/arobertm/minipay/vault-svc:149367767af0f55ac4b6818268407ac4264c1d02
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8085
          env:
            - name: SERVER_PORT
              value: "8085"
            - name: MINIDS_ADDRESS
              value: http://minids-api:8301
            - name: AUTH_JWK_URI
              value: http://auth-svc:8081/oauth2/jwks-rs256
            - name: AUTH_ISSUER_URI
              value: http://auth-svc:8081
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8085
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8085
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              memory: 192Mi
              cpu: 100m
            limits:
              memory: 384Mi
              cpu: 400m

---
apiVersion: v1
kind: Service
metadata:
  name: vault-svc
  namespace: minipay
spec:
  selector:
    app: vault-svc
  ports:
    - port: 8085
      targetPort: 8085
