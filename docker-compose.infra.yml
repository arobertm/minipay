version: '3.9'

# Infrastructura de baza — porneste asta intotdeauna primul
# Comanda: docker compose -f docker-compose.infra.yml up -d

services:

  # ─── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: minipay-postgres
    environment:
      POSTGRES_USER: minipay
      POSTGRES_PASSWORD: minipay_secret
      POSTGRES_DB: minipay
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minipay"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - minipay-net

  # ─── Zookeeper (necesar pentru Kafka) ────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: minipay-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - minipay-net

  # ─── Kafka ────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: minipay-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "29092:29092"   # acces din host (localhost:29092)
      - "9092:9092"     # acces din containere (kafka:9092)
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - minipay-net

  # ─── Kafka UI (vizualizare topics/messages) ───────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: minipay-kafka-ui
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: minipay
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8080:8080"
    networks:
      - minipay-net

  # ─── HashiCorp Vault (secrets management) ────────────────────
  vault:
    image: hashicorp/vault:1.15
    container_name: minipay-vault
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: minipay-vault-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - minipay-net

  # ─── Prometheus ───────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: minipay-prometheus
    volumes:
      - ./scripts/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - minipay-net

  # ─── Grafana ──────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: minipay-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - minipay-net

volumes:
  postgres_data:
  grafana_data:

networks:
  minipay-net:
    driver: bridge
