name: CI/CD Pipeline

# Triggered on every push to main.
# Does NOT trigger when the CI bot updates image tags in k8s/ (see [skip ci] below).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/arobertm/minipay

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── 0. Detect which services changed ────────────────────────────────────────
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
      rebuild_all: ${{ steps.diff.outputs.rebuild_all }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2   # need HEAD~1 for diff

      - id: diff
        name: Compute changed service list
        run: |
          # On first commit in repo HEAD~1 doesn't exist → rebuild everything
          if ! git rev-parse HEAD~1 >/dev/null 2>&1; then
            echo "rebuild_all=true" >> $GITHUB_OUTPUT
            echo "changed=" >> $GITHUB_OUTPUT
            echo "First commit — rebuilding all services"
            exit 0
          fi

          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$CHANGED_FILES"

          # Root pom.xml or workflow file changed → rebuild all services
          if echo "$CHANGED_FILES" | grep -qE '^(pom\.xml|\.github/workflows/)'; then
            echo "rebuild_all=true" >> $GITHUB_OUTPUT
            echo "Root pom.xml or workflow changed — rebuilding all services"
          else
            echo "rebuild_all=false" >> $GITHUB_OUTPUT
          fi

          # Extract service names:
          #   minids/...            → "minids"
          #   services/auth-svc/... → "auth-svc"
          #   services/fraud-svc/.. → "fraud-svc"
          CHANGED=$(echo "$CHANGED_FILES" \
            | grep -oE '^(minids|services/[^/]+)' \
            | sed 's|^services/||' \
            | sort -u \
            | tr '\n' ' ')
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT
          echo "Changed services: '$CHANGED'"

  # ── 1. Build all Java JARs (Maven, cached) ──────────────────────────────────
  maven-build:
    name: Maven Build
    runs-on: ubuntu-latest
    needs: detect-changes
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build all modules
        run: mvn clean package -DskipTests --batch-mode -q

      - name: Upload JARs
        uses: actions/upload-artifact@v4
        with:
          name: service-jars
          path: services/*/target/*.jar
          retention-days: 1

  # ── 2. Build & push Docker images (parallel matrix) ─────────────────────────
  build-push:
    name: Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [maven-build, detect-changes]
    # Only push images on merge to main (not on PRs)
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: minids
            dockerfile: minids/Dockerfile
            needs_jar: false

          - service: auth-svc
            dockerfile: services/auth-svc/Dockerfile
            needs_jar: true
          - service: user-svc
            dockerfile: services/user-svc/Dockerfile
            needs_jar: true
          - service: session-svc
            dockerfile: services/session-svc/Dockerfile
            needs_jar: true
          - service: gateway-svc
            dockerfile: services/gateway-svc/Dockerfile
            needs_jar: true
          - service: vault-svc
            dockerfile: services/vault-svc/Dockerfile
            needs_jar: true
          - service: network-svc
            dockerfile: services/network-svc/Dockerfile
            needs_jar: true
          - service: issuer-svc
            dockerfile: services/issuer-svc/Dockerfile
            needs_jar: true
          - service: audit-svc
            dockerfile: services/audit-svc/Dockerfile
            needs_jar: true
          - service: notif-svc
            dockerfile: services/notif-svc/Dockerfile
            needs_jar: true
          - service: settlement-svc
            dockerfile: services/settlement-svc/Dockerfile
            needs_jar: true
          - service: psd2-svc
            dockerfile: services/psd2-svc/Dockerfile
            needs_jar: true
          - service: tds-svc
            dockerfile: services/tds-svc/Dockerfile
            needs_jar: true
          - service: fraud-svc
            dockerfile: services/fraud-svc/Dockerfile
            needs_jar: false

    steps:
      - uses: actions/checkout@v4

      # ── Decide whether to build this service ──────────────────────────────
      - name: Check if build needed
        id: check
        run: |
          REBUILD_ALL="${{ needs.detect-changes.outputs.rebuild_all }}"
          CHANGED=" ${{ needs.detect-changes.outputs.changed }} "
          SERVICE="${{ matrix.service }}"

          if [[ "$REBUILD_ALL" == "true" ]]; then
            echo "build=true" >> $GITHUB_OUTPUT
            echo "✓ $SERVICE — rebuild_all triggered"
          elif [[ "$CHANGED" == *" $SERVICE "* ]]; then
            echo "build=true" >> $GITHUB_OUTPUT
            echo "✓ $SERVICE — changed files detected"
          else
            echo "build=false" >> $GITHUB_OUTPUT
            echo "↷ $SERVICE — no changes, skipping Docker build"
          fi

      # ── Only run the steps below when build=true ──────────────────────────
      - name: Download JARs
        if: steps.check.outputs.build == 'true' && matrix.needs_jar
        uses: actions/download-artifact@v4
        with:
          name: service-jars
          path: services

      - name: Set up Docker Buildx
        if: steps.check.outputs.build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        if: steps.check.outputs.build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        if: steps.check.outputs.build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ── 3. Update k8s manifests — only for services that were rebuilt ────────────
  update-manifests:
    name: Update K8s Image Tags
    runs-on: ubuntu-latest
    needs: [build-push, detect-changes]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Replace image tags for changed services only
        run: |
          SHA="${{ github.sha }}"
          REG="${{ env.IMAGE_PREFIX }}"
          REBUILD_ALL="${{ needs.detect-changes.outputs.rebuild_all }}"
          CHANGED=" ${{ needs.detect-changes.outputs.changed }} "

          # Map service → manifest file
          declare -A MANIFEST_MAP=(
            ["minids"]="k8s/data/minids.yaml"
            ["auth-svc"]="k8s/identity/auth-svc.yaml"
            ["user-svc"]="k8s/identity/user-svc.yaml"
            ["session-svc"]="k8s/identity/session-svc.yaml"
            ["gateway-svc"]="k8s/payments/gateway-svc.yaml"
            ["vault-svc"]="k8s/payments/vault-svc.yaml"
            ["network-svc"]="k8s/payments/network-svc.yaml"
            ["issuer-svc"]="k8s/payments/issuer-svc.yaml"
            ["audit-svc"]="k8s/security/audit-svc.yaml"
            ["notif-svc"]="k8s/security/notif-svc.yaml"
            ["fraud-svc"]="k8s/security/fraud-svc.yaml"
            ["settlement-svc"]="k8s/payments/settlement-svc.yaml"
            ["psd2-svc"]="k8s/payments/psd2-svc.yaml"
            ["tds-svc"]="k8s/security/tds-svc.yaml"
          )

          for svc in "${!MANIFEST_MAP[@]}"; do
            file="${MANIFEST_MAP[$svc]}"

            # Skip if this service wasn't rebuilt
            if [[ "$REBUILD_ALL" != "true" ]] && [[ "$CHANGED" != *" $svc "* ]]; then
              echo "  ↷ $svc — not rebuilt, keeping existing tag"
              continue
            fi

            if [[ ! -f "$file" ]]; then
              echo "  ✗ $file not found, skipping"
              continue
            fi

            sed -i "s|image: [^ ]*/${svc}:[^ ]*|image: ${REG}/${svc}:${SHA}|g" "$file"
            echo "  ✓ $svc → ${REG}/${svc}:${SHA}"
          done

      - name: Commit and push manifest changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/
          git diff --staged --quiet && echo "No manifest changes" && exit 0
          git commit -m "ci: update image tags to ${GITHUB_SHA::8} [skip ci]"
          git push
