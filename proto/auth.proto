syntax = "proto3";

package ro.minipay;

option java_package = "ro.minipay.proto";
option java_outer_classname = "AuthProto";

// ─── Token Introspection (inter-servicii) ─────────────────────
service AuthService {
  rpc Introspect(IntrospectRequest) returns (IntrospectResponse);
  rpc Revoke(RevokeRequest) returns (RevokeResponse);
}

message IntrospectRequest {
  string token = 1;
}

message IntrospectResponse {
  bool   active = 1;
  string subject = 2;       // user_id
  string client_id = 3;
  repeated string scope = 4;
  int64  exp = 5;            // expiry unix timestamp
  string jti = 6;            // JWT ID
}

message RevokeRequest {
  string token = 1;
  string token_type_hint = 2; // "access_token" sau "refresh_token"
}

message RevokeResponse {
  bool success = 1;
}
