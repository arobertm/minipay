server:
  port: ${SERVER_PORT:8093}

spring:
  application:
    name: notif-svc

  threads:
    virtual:
      enabled: true

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    consumer:
      group-id: notif-svc-group
      auto-offset-reset: earliest
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.value.default.type: ro.minipay.notif.kafka.PaymentEvent
        spring.json.use.type.headers: false
    listener:
      missing-topics-fatal: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  health:
    kafka:
      enabled: false   # Kafka unavailability must not block readiness
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    "[ro.minipay.notif]": DEBUG
