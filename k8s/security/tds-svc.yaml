---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tds-svc
  namespace: minipay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tds-svc
  template:
    metadata:
      labels:
        app: tds-svc
    spec:
      containers:
        - name: tds-svc
          image: ghcr.io/arobertm/minipay/tds-svc:bd034e48c8299ca27827f70fb0a3afe73c562bdf
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8096
          env:
            - name: SERVER_PORT
              value: "8096"
            - name: TDS_BASE_URL
              value: "http://tds-svc:8096"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8096
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8096
            initialDelaySeconds: 90
            periodSeconds: 15
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 200m

---
apiVersion: v1
kind: Service
metadata:
  name: tds-svc
  namespace: minipay
spec:
  selector:
    app: tds-svc
  ports:
    - port: 8096
      targetPort: 8096
