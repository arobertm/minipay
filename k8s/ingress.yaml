---
# Traefik Ingress — k3s bundles Traefik as the default ingress controller.
# All routes use path-based routing on the server's public IP (no DNS required).
#
# Access pattern (replace <SERVER_IP> with your DigitalOcean droplet IP):
#   http://<SERVER_IP>/api/...      → gateway-svc  (main payment API)
#   http://<SERVER_IP>/auth/...     → auth-svc      (OAuth2/OIDC)
#   http://<SERVER_IP>/users/...    → user-svc
#   http://<SERVER_IP>/grafana/...  → Grafana dashboards
#   http://<SERVER_IP>/kafka/       → Kafka UI
#   http://<SERVER_IP>/minids/...   → MiniDS REST (debug)

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: minipay-ingress
  namespace: minipay
  annotations:
    # Strip path prefixes before forwarding
    # Excluded: minids (serves at /minids/v1/), kafka-ui (context path set via SERVER_SERVLET_CONTEXT_PATH)
    traefik.ingress.kubernetes.io/router.middlewares: minipay-cors@kubernetescrd,minipay-strip-api@kubernetescrd,minipay-strip-auth@kubernetescrd,minipay-strip-users@kubernetescrd,minipay-strip-notif@kubernetescrd,minipay-strip-psd2@kubernetescrd,minipay-strip-tds@kubernetescrd,minipay-strip-settlements@kubernetescrd
    traefik.ingress.kubernetes.io/router.tls.certresolver: "letsencrypt"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - api-minipay.online
  rules:
    - host: api-minipay.online
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: gateway-svc
                port:
                  number: 8084
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: auth-svc
                port:
                  number: 8081
          - path: /users
            pathType: Prefix
            backend:
              service:
                name: user-svc
                port:
                  number: 8082
          - path: /minids
            pathType: Prefix
            backend:
              service:
                name: minids-api
                port:
                  number: 8301
          - path: /notif
            pathType: Prefix
            backend:
              service:
                name: notif-svc
                port:
                  number: 8093
          - path: /psd2
            pathType: Prefix
            backend:
              service:
                name: psd2-svc
                port:
                  number: 8095
          - path: /tds
            pathType: Prefix
            backend:
              service:
                name: tds-svc
                port:
                  number: 8096
          - path: /settlements
            pathType: Prefix
            backend:
              service:
                name: settlement-svc
                port:
                  number: 8094
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000

---
# CORS middleware — allows browser requests from localhost (dev) and Vercel (prod)
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: cors
  namespace: minipay
spec:
  headers:
    accessControlAllowOriginList:
      - "http://localhost:3000"
      - "http://localhost:3001"
      - "https://minipay.vercel.app"
      - "https://*.vercel.app"
    accessControlAllowMethods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
      - PATCH
    accessControlAllowHeaders:
      - "Authorization"
      - "Content-Type"
      - "Accept"
      - "Origin"
      - "X-Requested-With"
    accessControlExposeHeaders:
      - "Content-Length"
    accessControlMaxAge: 3600
    addVaryHeader: true

---
# Middleware: strip /api prefix before forwarding to gateway-svc
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-api
  namespace: minipay
spec:
  stripPrefix:
    prefixes:
      - /api

---
# Middleware: strip /auth prefix before forwarding to auth-svc
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-auth
  namespace: minipay
spec:
  stripPrefix:
    prefixes:
      - /auth

---
# Middleware: strip /users prefix before forwarding to user-svc
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-users
  namespace: minipay
spec:
  stripPrefix:
    prefixes:
      - /users

---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-notif
  namespace: minipay
spec:
  stripPrefix:
    prefixes:
      - /notif

---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-psd2
  namespace: minipay
spec:
  stripPrefix:
    prefixes:
      - /psd2

---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-tds
  namespace: minipay
spec:
  stripPrefix:
    prefixes:
      - /tds

---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-settlements
  namespace: minipay
spec:
  stripPrefix:
    prefixes:
      - /settlements

