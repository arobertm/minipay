---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: minipay
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'auth-svc'
        static_configs:
          - targets: ['auth-svc:8081']
        metrics_path: '/actuator/prometheus'

      - job_name: 'user-svc'
        static_configs:
          - targets: ['user-svc:8082']
        metrics_path: '/actuator/prometheus'

      - job_name: 'session-svc'
        static_configs:
          - targets: ['session-svc:8083']
        metrics_path: '/actuator/prometheus'

      - job_name: 'gateway-svc'
        static_configs:
          - targets: ['gateway-svc:8084']
        metrics_path: '/actuator/prometheus'

      - job_name: 'vault-svc'
        static_configs:
          - targets: ['vault-svc:8085']
        metrics_path: '/actuator/prometheus'

      - job_name: 'network-svc'
        static_configs:
          - targets: ['network-svc:8086']
        metrics_path: '/actuator/prometheus'

      - job_name: 'issuer-svc'
        static_configs:
          - targets: ['issuer-svc:8087']
        metrics_path: '/actuator/prometheus'

      - job_name: 'fraud-svc'
        static_configs:
          - targets: ['fraud-svc:8090']
        metrics_path: '/metrics'

      - job_name: 'audit-svc'
        static_configs:
          - targets: ['audit-svc:8091']
        metrics_path: '/actuator/prometheus'

      - job_name: 'minids'
        static_configs:
          - targets: ['minids-0.minids:8301', 'minids-1.minids:8301', 'minids-2.minids:8301']
        metrics_path: '/actuator/prometheus'

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: minipay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.51.0
          ports:
            - containerPort: 9090
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=7d
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: minipay
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
