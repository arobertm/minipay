---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-ui
  namespace: minipay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-ui
  template:
    metadata:
      labels:
        app: kafka-ui
    spec:
      containers:
        - name: kafka-ui
          image: provectuslabs/kafka-ui:latest
          ports:
            - containerPort: 8080
          env:
            - name: KAFKA_CLUSTERS_0_NAME
              value: minipay
            - name: KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS
              value: kafka:9092
            - name: SERVER_SERVLET_CONTEXT_PATH
              value: /kafka
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 384Mi
              cpu: 300m

---
apiVersion: v1
kind: Service
metadata:
  name: kafka-ui
  namespace: minipay
spec:
  selector:
    app: kafka-ui
  ports:
    - port: 8080
      targetPort: 8080
