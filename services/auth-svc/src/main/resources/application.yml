server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: auth-svc

  # Virtual Threads (Java 21 — Project Loom)
  threads:
    virtual:
      enabled: true

  jackson:
    serialization:
      write-dates-as-timestamps: false

# MiniDS Directory Server (OAuth2 storage)
minids:
  base-url: ${MINIDS_ADDRESS:http://minids-0:8301}
  connect-timeout: 5000
  read-timeout: 10000

# HashiCorp Vault
vault:
  uri: ${VAULT_URI:http://localhost:8200}
  token: ${VAULT_TOKEN:minipay-vault-token}

# gRPC server port
grpc:
  server:
    port: ${GRPC_PORT:9081}

# Actuator / Prometheus
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# PQC & OAuth2 Settings
minipay:
  auth:
    jwt-algorithm: DILITHIUM3
    access-token-ttl-minutes: 60
    refresh-token-ttl-days: 30

logging:
  level:
    "[ro.minipay.auth]": DEBUG
    "[org.springframework.security]": INFO
