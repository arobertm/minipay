---
# Traefik Ingress — MiniPay
#
# Strip rules:
#   /api   → strip (controller uses /v1/payments)
#   /auth  → strip (Spring AuthServer has no /auth prefix)
#   /users → strip (pattern: /users/users/X → strip → /users/X → controller /users/{X})
#   /notif → strip (controller uses /notifications, not /notif)
#
# NO strip for: /settlements, /psd2, /tds, /audit, /vault, /fraud
#   (controllers already have their own prefix matching the path)

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: minipay-ingress
  namespace: minipay
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: minipay-cors@kubernetescrd,minipay-strip-api@kubernetescrd,minipay-strip-auth@kubernetescrd,minipay-strip-users@kubernetescrd,minipay-strip-notif@kubernetescrd
    traefik.ingress.kubernetes.io/router.tls.certresolver: "letsencrypt"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - api-minipay.online
  rules:
    - host: api-minipay.online
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: gateway-svc
                port:
                  number: 8084
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: auth-svc
                port:
                  number: 8081
          - path: /users
            pathType: Prefix
            backend:
              service:
                name: user-svc
                port:
                  number: 8082
          - path: /notif
            pathType: Prefix
            backend:
              service:
                name: notif-svc
                port:
                  number: 8093
          - path: /settlements
            pathType: Prefix
            backend:
              service:
                name: settlement-svc
                port:
                  number: 8094
          - path: /psd2
            pathType: Prefix
            backend:
              service:
                name: psd2-svc
                port:
                  number: 8095
          - path: /tds
            pathType: Prefix
            backend:
              service:
                name: tds-svc
                port:
                  number: 8096
          - path: /audit
            pathType: Prefix
            backend:
              service:
                name: audit-svc
                port:
                  number: 8091
          - path: /vault
            pathType: Prefix
            backend:
              service:
                name: vault-svc
                port:
                  number: 8085
          - path: /fraud
            pathType: Prefix
            backend:
              service:
                name: fraud-svc
                port:
                  number: 8090
          - path: /minids
            pathType: Prefix
            backend:
              service:
                name: minids-api
                port:
                  number: 8301
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000

---
# CORS middleware
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: cors
  namespace: minipay
spec:
  headers:
    accessControlAllowOriginList:
      - "http://localhost:3000"
      - "http://localhost:3001"
      - "https://minipay.vercel.app"
      - "https://*.vercel.app"
    accessControlAllowMethods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
      - PATCH
    accessControlAllowHeaders:
      - "Authorization"
      - "Content-Type"
      - "Accept"
      - "Origin"
      - "X-Requested-With"
    accessControlExposeHeaders:
      - "Content-Length"
    accessControlMaxAge: 3600
    addVaryHeader: true

---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-api
  namespace: minipay
spec:
  stripPrefix:
    prefixes:
      - /api

---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-auth
  namespace: minipay
spec:
  stripPrefix:
    prefixes:
      - /auth

---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-users
  namespace: minipay
spec:
  stripPrefix:
    prefixes:
      - /users

---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-notif
  namespace: minipay
spec:
  stripPrefix:
    prefixes:
      - /notif
