
# Infrastructura de baza — porneste asta intotdeauna primul
# Comanda: docker compose -f docker-compose.infra.yml up -d

services:

  # ─── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: minipay-postgres
    environment:
      POSTGRES_USER: minipay
      POSTGRES_PASSWORD: minipay_secret
      POSTGRES_DB: minipay
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minipay"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - minipay-net

  # ─── Kafka (KRaft mode — fara Zookeeper, Apache oficial) ────
  kafka:
    image: apache/kafka:latest
    container_name: minipay-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qg"
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - minipay-net

  # ─── Kafka UI (vizualizare topics/messages) ───────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: minipay-kafka-ui
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: minipay
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8080:8080"
    networks:
      - minipay-net

  # ─── HashiCorp Vault (secrets management) ────────────────────
  vault:
    image: hashicorp/vault:1.15
    container_name: minipay-vault
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: minipay-vault-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - minipay-net

  # ─── Prometheus ───────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: minipay-prometheus
    volumes:
      - ./scripts/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - minipay-net

  # ─── Grafana ──────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: minipay-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - minipay-net

volumes:
  postgres_data:
  grafana_data:

networks:
  minipay-net:
    driver: bridge
