name: CI/CD Pipeline

# Triggered on every push to main.
# Does NOT trigger when the CI bot updates image tags in k8s/ (see [skip ci] below).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/arobertm/minipay

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Build all Java JARs (Maven, cached) ──────────────────────────────────
  maven-build:
    name: Maven Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build all modules
        run: mvn clean package -DskipTests --batch-mode -q

      - name: Upload JARs
        uses: actions/upload-artifact@v4
        with:
          name: service-jars
          # Uploads services/*/target/*.jar preserving directory structure
          path: services/*/target/*.jar
          retention-days: 1

  # ── 2. Build & push Docker images (parallel matrix) ─────────────────────────
  build-push:
    name: Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: maven-build
    # Only push images on merge to main (not on PRs)
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # minids builds Maven inside Docker (multi-stage) — no pre-built JAR needed
          - service: minids
            dockerfile: minids/Dockerfile
            needs_jar: false

          # All Java microservices — copy pre-built JAR from target/
          - service: auth-svc
            dockerfile: services/auth-svc/Dockerfile
            needs_jar: true
          - service: user-svc
            dockerfile: services/user-svc/Dockerfile
            needs_jar: true
          - service: session-svc
            dockerfile: services/session-svc/Dockerfile
            needs_jar: true
          - service: gateway-svc
            dockerfile: services/gateway-svc/Dockerfile
            needs_jar: true
          - service: vault-svc
            dockerfile: services/vault-svc/Dockerfile
            needs_jar: true
          - service: network-svc
            dockerfile: services/network-svc/Dockerfile
            needs_jar: true
          - service: issuer-svc
            dockerfile: services/issuer-svc/Dockerfile
            needs_jar: true
          - service: audit-svc
            dockerfile: services/audit-svc/Dockerfile
            needs_jar: true

          # Python service — no JAR needed
          - service: fraud-svc
            dockerfile: services/fraud-svc/Dockerfile
            needs_jar: false

    steps:
      - uses: actions/checkout@v4

      # Restore JARs for services that need them (Docker context is repo root)
      - name: Download JARs
        if: matrix.needs_jar
        uses: actions/download-artifact@v4
        with:
          name: service-jars
          # Restores to ./services/<svc>/target/<svc>.jar — matches Dockerfile COPY paths
          path: services

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          # GitHub Actions cache for Docker layers (speeds up subsequent builds)
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ── 3. Update k8s manifests with new SHA → Argo CD picks it up ──────────────
  update-manifests:
    name: Update K8s Image Tags
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Use bot token so the push bypasses branch protection if enabled
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Replace image tags in k8s manifests
        run: |
          SHA="${{ github.sha }}"
          REG="${{ env.IMAGE_PREFIX }}"

          # Format: "service-name:path/to/manifest.yaml"
          # Pattern matches both "minipay/svc:tag" and "ghcr.io/.../minipay/svc:tag"
          MANIFESTS=(
            "minids:k8s/data/minids.yaml"
            "auth-svc:k8s/identity/auth-svc.yaml"
            "user-svc:k8s/identity/user-svc.yaml"
            "session-svc:k8s/identity/session-svc.yaml"
            "gateway-svc:k8s/payments/gateway-svc.yaml"
            "vault-svc:k8s/payments/vault-svc.yaml"
            "network-svc:k8s/payments/network-svc.yaml"
            "issuer-svc:k8s/payments/issuer-svc.yaml"
            "audit-svc:k8s/security/audit-svc.yaml"
            "fraud-svc:k8s/security/fraud-svc.yaml"
          )

          for entry in "${MANIFESTS[@]}"; do
            svc="${entry%%:*}"
            file="${entry#*:}"
            if [[ ! -f "$file" ]]; then
              echo "ERROR: $file not found" && exit 1
            fi
            # Matches: "image: minipay/svc:tag" OR "image: ghcr.io/.../svc:tag"
            sed -i "s|image: [^ ]*/${svc}:[^ ]*|image: ${REG}/${svc}:${SHA}|g" "$file"
            echo "  ✓ $svc → ${REG}/${svc}:${SHA}"
          done

      - name: Commit and push manifest changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/
          # --quiet exits 0 if nothing to commit
          git diff --staged --quiet && echo "No manifest changes" && exit 0
          git commit -m "ci: update image tags to ${GITHUB_SHA::8} [skip ci]"
          git push
