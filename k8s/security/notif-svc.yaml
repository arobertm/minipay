---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notif-svc
  namespace: minipay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notif-svc
  template:
    metadata:
      labels:
        app: notif-svc
    spec:
      containers:
        - name: notif-svc
          image: ghcr.io/arobertm/minipay/notif-svc:1cc57c074f9de3ad6e75301f16ce99b6818a4ba7
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8093
          env:
            - name: SERVER_PORT
              value: "8093"
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8093
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8093
            initialDelaySeconds: 40
            periodSeconds: 15
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 200m

---
apiVersion: v1
kind: Service
metadata:
  name: notif-svc
  namespace: minipay
spec:
  selector:
    app: notif-svc
  ports:
    - port: 8093
      targetPort: 8093
