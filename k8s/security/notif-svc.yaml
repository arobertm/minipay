---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notif-svc
  namespace: minipay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notif-svc
  template:
    metadata:
      labels:
        app: notif-svc
    spec:
      containers:
        - name: notif-svc
          image: ghcr.io/arobertm/minipay/notif-svc:908fc4337a3488e097c8969ff6f465a4b42d4fb2
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8093
          env:
            - name: SERVER_PORT
              value: "8093"
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
            - name: JAVA_TOOL_OPTIONS
              value: "-Xms64m -Xmx200m -XX:+UseG1GC -XX:MaxMetaspaceSize=128m"
          # startupProbe gives up to 5 min for JVM startup under CPU throttling.
          # Once it passes, readiness/liveness take over.
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8093
            failureThreshold: 30   # 30 × 10s = 5 minutes max
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8093
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8093
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 300m

---
apiVersion: v1
kind: Service
metadata:
  name: notif-svc
  namespace: minipay
spec:
  selector:
    app: notif-svc
  ports:
    - port: 8093
      targetPort: 8093
