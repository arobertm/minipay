# version: '3.9'

# Servicii MiniPay cu profiles
# Foloseste: docker compose --profile auth up
#            docker compose --profile payments up
#            docker compose --profile all up

include:
  - docker-compose.infra.yml

services:

  # ═══════════════════════════════════════════════
  # IDENTITY DOMAIN
  # ═══════════════════════════════════════════════

  auth-svc:
    build:
      context: .
      dockerfile: services/auth-svc/Dockerfile
    image: minipay/auth-svc:latest
    container_name: minipay-auth
    restart: unless-stopped
    profiles: ["auth", "payments", "all"]
    environment:
      MINIDS_ADDRESS: minids-1:8311
      VAULT_URI: http://vault:8200
      VAULT_TOKEN: minipay-vault-token
      SERVER_PORT: 8081
      GRPC_PORT: 9081
    ports:
      - "8081:8081"
      - "9081:9081"
    depends_on:
      minids-1:
        condition: service_healthy
    networks:
      - minipay-net

  user-svc:
    build:
      context: .
      dockerfile: services/user-svc/Dockerfile
    image: minipay/user-svc:latest
    container_name: minipay-user
    restart: unless-stopped
    profiles: ["auth", "payments", "all"]
    environment:
      MINIDS_ADDRESS: http://minids-1:8311
      AUTH_JWK_URI: http://auth-svc:8081/oauth2/jwks-rs256
      AUTH_ISSUER_URI: http://auth-svc:8081
      SERVER_PORT: 8082
      GRPC_PORT: 9082
    ports:
      - "8082:8082"
      - "9082:9082"
    depends_on:
      minids-1:
        condition: service_healthy
      auth-svc:
        condition: service_started
    networks:
      - minipay-net

  session-svc:
    build:
      context: .
      dockerfile: services/session-svc/Dockerfile
    image: minipay/session-svc:latest
    container_name: minipay-session
    restart: unless-stopped
    profiles: ["auth", "payments", "all"]
    environment:
      MINIDS_ADDRESS: http://minids-1:8311
      AUTH_JWK_URI: http://auth-svc:8081/oauth2/jwks-rs256
      AUTH_ISSUER_URI: http://auth-svc:8081
      SERVER_PORT: 8083
    ports:
      - "8083:8083"
    depends_on:
      minids-1:
        condition: service_healthy
      auth-svc:
        condition: service_started
    networks:
      - minipay-net

  # ═══════════════════════════════════════════════
  # PAYMENTS DOMAIN
  # ═══════════════════════════════════════════════

  gateway-svc:
    build:
      context: .
      dockerfile: services/gateway-svc/Dockerfile
    image: minipay/gateway-svc:latest
    container_name: minipay-gateway
    restart: unless-stopped
    profiles: ["payments", "all"]
    environment:
      SERVER_PORT: 8084
      AUTH_JWK_URI: http://auth-svc:8081/oauth2/jwks-rs256
      AUTH_ISSUER_URI: http://auth-svc:8081
      VAULT_URL: http://vault-svc:8085
      FRAUD_URL: http://fraud-svc:8090
      NETWORK_URL: http://network-svc:8086
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8084:8084"
    depends_on:
      minids-1:
        condition: service_healthy
      auth-svc:
        condition: service_started
      vault-svc:
        condition: service_started
    networks:
      - minipay-net

  vault-svc:
    build:
      context: .
      dockerfile: services/vault-svc/Dockerfile
    image: minipay/vault-svc:latest
    container_name: minipay-vault-svc
    restart: unless-stopped
    profiles: ["payments", "all"]
    environment:
      SERVER_PORT: 8085
      MINIDS_ADDRESS: http://minids-1:8311
      AUTH_JWK_URI: http://auth-svc:8081/oauth2/jwks-rs256
      AUTH_ISSUER_URI: http://auth-svc:8081
    ports:
      - "8085:8085"
    depends_on:
      minids-1:
        condition: service_healthy
      auth-svc:
        condition: service_started
    networks:
      - minipay-net

  network-svc:
    build:
      context: .
      dockerfile: services/network-svc/Dockerfile
    image: minipay/network-svc:latest
    container_name: minipay-network
    restart: unless-stopped
    profiles: ["payments", "all"]
    environment:
      SERVER_PORT: 8086
      VAULT_URL: http://vault-svc:8085
      ISSUER_URL: http://issuer-svc:8087
    ports:
      - "8086:8086"
    depends_on:
      vault-svc:
        condition: service_started
      issuer-svc:
        condition: service_started
    networks:
      - minipay-net

  issuer-svc:
    build:
      context: .
      dockerfile: services/issuer-svc/Dockerfile
    image: minipay/issuer-svc:latest
    container_name: minipay-issuer
    restart: unless-stopped
    profiles: ["payments", "all"]
    environment:
      SERVER_PORT: 8087
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/minipay_issuer
      SPRING_DATASOURCE_USERNAME: minipay
      SPRING_DATASOURCE_PASSWORD: minipay_secret
    ports:
      - "8087:8087"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - minipay-net

  tds-svc:
    build:
      context: ./services/tds-svc
      dockerfile: Dockerfile
    image: minipay/tds-svc:latest
    container_name: minipay-tds
    profiles: ["all"]
    environment:
      SERVER_PORT: 8088
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/minipay_tds
      SPRING_DATASOURCE_USERNAME: minipay
      SPRING_DATASOURCE_PASSWORD: minipay_secret
    ports:
      - "8088:8088"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - minipay-net

  settlement-svc:
    build:
      context: ./services/settlement-svc
      dockerfile: Dockerfile
    image: minipay/settlement-svc:latest
    container_name: minipay-settlement
    profiles: ["all"]
    environment:
      SERVER_PORT: 8089
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/minipay_settlement
      SPRING_DATASOURCE_USERNAME: minipay
      SPRING_DATASOURCE_PASSWORD: minipay_secret
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8089:8089"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - minipay-net

  # ═══════════════════════════════════════════════
  # SECURITY DOMAIN
  # ═══════════════════════════════════════════════

  fraud-svc:
    build:
      context: .
      dockerfile: services/fraud-svc/Dockerfile
    image: minipay/fraud-svc:latest
    container_name: minipay-fraud
    restart: unless-stopped
    profiles: ["fraud", "payments", "all"]
    environment:
      MODEL_DIR: /app/model_store
    ports:
      - "8090:8090"
    volumes:
      - fraud-model:/app/model_store
    networks:
      - minipay-net

  audit-svc:
    build:
      context: .
      dockerfile: services/audit-svc/Dockerfile
    image: minipay/audit-svc:latest
    container_name: minipay-audit
    restart: unless-stopped
    profiles: ["payments", "all"]
    environment:
      SERVER_PORT: 8091
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/minipay_audit
      SPRING_DATASOURCE_USERNAME: minipay
      SPRING_DATASOURCE_PASSWORD: minipay_secret
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8091:8091"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - minipay-net

  psd2-svc:
    build:
      context: ./services/psd2-svc
      dockerfile: Dockerfile
    image: minipay/psd2-svc:latest
    container_name: minipay-psd2
    profiles: ["all"]
    environment:
      SERVER_PORT: 8092
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/minipay_psd2
      SPRING_DATASOURCE_USERNAME: minipay
      SPRING_DATASOURCE_PASSWORD: minipay_secret
    ports:
      - "8092:8092"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - minipay-net

  notif-svc:
    build:
      context: ./services/notif-svc
      dockerfile: Dockerfile
    image: minipay/notif-svc:latest
    container_name: minipay-notif
    profiles: ["all"]
    environment:
      SERVER_PORT: 8093
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8093:8093"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - minipay-net

  # ═══════════════════════════════════════════════
  # MiniDS — Raft Cluster (3 noduri)
  # ═══════════════════════════════════════════════

  minids-0:
    build:
      context: .
      dockerfile: minids/Dockerfile
    image: minipay/minids:latest
    container_name: minipay-minids-0
    restart: unless-stopped
    profiles: ["payments", "all"]
    environment:
      NODE_ID: minids-0
      RAFT_PORT: 8300
      API_PORT: 8301
      RAFT_PEERS: minids-0:8301,minids-1:8311,minids-2:8321
      DATA_DIR: /data/rocksdb
      RAFT_RESOLVE_LOCALHOST: "false"
    ports:
      - "8300:8300"
      - "8301:8301"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8301/minids/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    volumes:
      - minids_0_data:/data/rocksdb
    networks:
      - minipay-net

  minids-1:
    build:
      context: .
      dockerfile: minids/Dockerfile
    image: minipay/minids:latest
    container_name: minipay-minids-1
    restart: unless-stopped
    profiles: ["payments", "all"]
    environment:
      NODE_ID: minids-1
      RAFT_PORT: 8310
      API_PORT: 8311
      RAFT_PEERS: minids-0:8301,minids-1:8311,minids-2:8321
      DATA_DIR: /data/rocksdb
      RAFT_RESOLVE_LOCALHOST: "false"
    ports:
      - "8310:8310"
      - "8311:8311"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8311/minids/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    volumes:
      - minids_1_data:/data/rocksdb
    networks:
      - minipay-net

  minids-2:
    build:
      context: .
      dockerfile: minids/Dockerfile
    image: minipay/minids:latest
    container_name: minipay-minids-2
    restart: unless-stopped
    profiles: ["payments", "all"]
    environment:
      NODE_ID: minids-2
      RAFT_PORT: 8320
      API_PORT: 8321
      RAFT_PEERS: minids-0:8301,minids-1:8311,minids-2:8321
      DATA_DIR: /data/rocksdb
      RAFT_RESOLVE_LOCALHOST: "false"
    ports:
      - "8320:8320"
      - "8321:8321"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8321/minids/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    volumes:
      - minids_2_data:/data/rocksdb
    networks:
      - minipay-net

volumes:
  minids_0_data:
  minids_1_data:
  minids_2_data:
  fraud-model:
